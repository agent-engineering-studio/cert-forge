services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: cca-exam-simulator:latest
    container_name: cca-exam-simulator
    ports:
      - "3000:3000"
    # ANTHROPIC_API_KEY, ANTHROPIC_MODEL, and AUTH_SECRET come from .env.local
    # (via env_file). Do NOT also list them under `environment:` with
    # ${VAR}/${VAR:-default} — that interpolates from the host shell and, since
    # `environment` overrides `env_file`, an unset host var would clobber the
    # real value from .env.local with an empty string (or the default).
    environment:
      - NODE_ENV=production
      # Inside the compose network the DB is reachable at host `db`, so override
      # whatever DATABASE_URL .env.local uses for `make dev` (localhost).
      - DATABASE_URL=${DATABASE_URL:-postgres://cca:cca@db:5432/cca}
    env_file:
      - path: .env.local
        required: false
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: cca-exam-db
    environment:
      - POSTGRES_USER=cca
      - POSTGRES_PASSWORD=cca
      - POSTGRES_DB=cca
    # Expose locally so `make dev` can also reach it on 5432.
    ports:
      - "5432:5432"
    volumes:
      - cca-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cca -d cca"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  cca-pgdata:
